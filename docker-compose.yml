services:
  db:
    image: postgres:16-alpine
    container_name: sheep_portal_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sheep
      POSTGRES_PASSWORD: sheep
      POSTGRES_DB: sheep_portal
    ports:
      - "5432:5432"
    volumes:
      - sheep_portal_pgdata:/var/lib/postgresql/data

volumes:
  sheep_portal_pgdata:
